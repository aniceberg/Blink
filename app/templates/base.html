<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Blink{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/camera_views.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/"><img src="/static/blink-icon.png" alt="" class="brand-icon">Blink</a>
      <span class="version-badge">v{{ app_version }}</span>
      {% if update %}
        <a class="update-badge" href="{{ update.html_url }}" target="_blank" rel="noopener">{{ update.tag_name }} available</a>
      {% endif %}
      <nav>
        <a href="/" class="nav-icon-link" aria-label="Home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </a>
        <a href="/jobs/new">New Job</a>
        <a href="/jobs">Jobs</a>
        <a href="/setup">Setup</a>
        <a href="/cameras">Cameras</a>
      </nav>
    </header>
    <main class="shell">
      {% if not ffmpeg.ok %}
        <div class="notice error">
          {{ ffmpeg.message }} HEVC jobs will remain failed until a supported encoder is available.
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
